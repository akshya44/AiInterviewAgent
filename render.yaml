services:
  # ── Backend Node.js Service ──────────────────────────────────────────────────
  - type: web
    name: ai-interview-backend
    env: node
    region: oregon
    rootDir: server
    buildCommand: "npm install && npx prisma generate"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        sync: false   # ← Set to your Render PostgreSQL External Database URL
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # ── Frontend Static React Service ────────────────────────────────────────────
  - type: static
    name: ai-interview-frontend
    env: static
    region: oregon
    rootDir: client
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-interview-backend
          envVarKey: RENDER_EXTERNAL_URL
